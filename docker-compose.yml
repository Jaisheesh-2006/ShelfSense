# ShelfSense full stack. One command, zero manual steps (acceptance-gate requirement):
#   docker compose up --build
#
# Exposes to the host: api:8000, prometheus:9090, grafana:3000.
# Postgres/Redis are internal-only (not published) to avoid clashing with local services.

# Shared environment for the Python services. Sensible defaults so the stack runs with no .env.
x-app-env: &app-env
  ENVIRONMENT: development
  LOG_LEVEL: INFO
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: shelfsense
  POSTGRES_USER: shelfsense
  POSTGRES_PASSWORD: shelfsense
  REDIS_HOST: redis
  REDIS_PORT: "6379"

services:
  # ---- Infrastructure ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shelfsense
      POSTGRES_USER: shelfsense
      POSTGRES_PASSWORD: shelfsense
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelfsense -d shelfsense"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # ---- Application services ----
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment: *app-env
    ports:
      - "8000:8000"
    volumes:
      # POS sales CSV (user-owned, gitignored). Mounted read-only; loaded into Postgres on startup.
      - "./docs/raw:/data/pos:ro"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Explicit healthcheck (mirrors the api Dockerfile) so the detector's `service_healthy` dependency
    # is legible from compose alone — hits /healthz via stdlib urllib (the slim image has no curl).
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 12
    restart: unless-stopped

  detector:
    build:
      context: .
      dockerfile: services/detector/Dockerfile
    environment:
      <<: *app-env
      CCTV_DIR: /data/cctv
      API_BASE_URL: http://api:8000   # detector POSTs emitted events here (auto-feed, ADR-0015)
    volumes:
      # CCTV clips are local-only (gitignored). Mounted read-only for detection.
      - "./docs/raw/CCTV Footage/CCTV Footage:/data/cctv:ro"
      # Emitted events also written here, so the JSONL is inspectable on the host.
      - "./data/events:/data/events"
    depends_on:
      # Wait for the API to be healthy, then auto-POST events to /events/ingest (no manual replay).
      api:
        condition: service_healthy
    restart: unless-stopped

  # ---- Observability ----
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---- Dashboard (Part E) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"   # the live dashboard — http://localhost:8080 (polls the API on :8000)
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
