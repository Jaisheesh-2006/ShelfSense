# Repo-level config for tooling that spans services (tests, lint).
[tool.pytest.ini_options]
pythonpath = ["services/common", "services/detector"]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
