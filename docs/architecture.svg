<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 1320" font-family="Segoe UI, system-ui, -apple-system, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="8" refY="3" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .h1{font-size:32px;font-weight:700;fill:#0f172a}
      .h2{font-size:15px;fill:#64748b}
      .sec{font-size:12.5px;font-weight:600;fill:#64748b;letter-spacing:1.5px}
      .bt{font-size:16px;font-weight:700;fill:#0f172a}
      .bs{font-size:12.5px;fill:#64748b}
      .st{font-size:14px;font-weight:700;fill:#0f172a}
      .ss{font-size:11px;fill:#64748b}
      .pill{font-size:12px;fill:#334155}
      .amber{font-size:12px;font-weight:600;fill:#92400e}
      .accB{font-size:17px;font-weight:700;fill:#1e40af}
      .accT{font-size:17px;font-weight:700;fill:#0f766e}
      .mut{font-size:12.5px;fill:#64748b}
      .ban1{font-size:14.5px;font-weight:700;fill:#0f172a}
      .ban2{font-size:12.5px;fill:#475569}
      .ing{font-size:14px;font-weight:700;fill:#0f766e}
    </style>
  </defs>

  <rect x="0" y="0" width="1320" height="1320" fill="#ffffff"/>

  <!-- Title -->
  <text class="h1" x="40" y="56">ShelfSense — System Architecture</text>
  <text class="h2" x="42" y="86">Event-driven: CCTV → behavioural events → intelligence API → dashboard.  One command: docker compose up --build</text>
  <line x1="40" y1="104" x2="1280" y2="104" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Raw inputs -->
  <text class="sec" x="40" y="128">RAW INPUTS  ·  USER-OWNED, READ-ONLY</text>
  <rect x="40" y="140" width="610" height="74" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="bt" x="62" y="170">CCTV Clips</text>
  <text class="bs" x="62" y="193">2 stores · ~4 role-named cameras each (entry · zone · billing)</text>
  <rect x="670" y="140" width="610" height="74" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="bt" x="692" y="170">POS Sales CSV</text>
  <text class="bs" x="692" y="193">24 transactions/day · ST1008 only — loaded into the API at startup</text>

  <line x1="345" y1="214" x2="345" y2="244" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Detection pipeline -->
  <rect x="40" y="246" width="1240" height="350" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text class="accB" x="64" y="280">DETECTION PIPELINE</text>
  <text class="mut" x="285" y="280">offline CV · owns all per-person reasoning · opt-in:  docker compose --profile detect</text>

  <!-- stage row -->
  <g>
    <rect x="68" y="302" width="170" height="74" rx="9" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text class="st" x="153" y="335" text-anchor="middle">YOLOv8n</text>
    <text class="ss" x="153" y="354" text-anchor="middle">person detect (CPU)</text>

    <rect x="271" y="302" width="170" height="74" rx="9" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text class="st" x="356" y="335" text-anchor="middle">ByteTrack</text>
    <text class="ss" x="356" y="354" text-anchor="middle">multi-object tracking</text>

    <rect x="474" y="302" width="170" height="74" rx="9" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text class="st" x="559" y="335" text-anchor="middle">Motion Stitch</text>
    <text class="ss" x="559" y="354" text-anchor="middle">re-link fragments</text>

    <rect x="677" y="302" width="170" height="74" rx="9" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text class="st" x="762" y="335" text-anchor="middle">Re-ID</text>
    <text class="ss" x="762" y="354" text-anchor="middle">histogram · cross-cam</text>

    <rect x="880" y="302" width="170" height="74" rx="9" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text class="st" x="965" y="335" text-anchor="middle">Zones + Direction</text>
    <text class="ss" x="965" y="354" text-anchor="middle">dwell · line crossing</text>

    <rect x="1083" y="302" width="170" height="74" rx="9" fill="#ffffff" stroke="#93c5fd" stroke-width="1.8"/>
    <text class="st" x="1168" y="335" text-anchor="middle">Emit Events</text>
    <text class="ss" x="1168" y="354" text-anchor="middle">BehaviorEvent</text>

    <line x1="238" y1="339" x2="270" y2="339" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="441" y1="339" x2="473" y2="339" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="644" y1="339" x2="676" y2="339" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="847" y1="339" x2="879" y2="339" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="1050" y1="339" x2="1082" y2="339" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- cross-cutting pills -->
  <rect x="68" y="398" width="380" height="46" rx="9" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text class="amber" x="258" y="426" text-anchor="middle">Optional VLM — staff &amp; zone labels  (off by default)</text>
  <rect x="470" y="398" width="380" height="46" rx="9" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text class="amber" x="660" y="426" text-anchor="middle">Optional pose group-split  (off by default)</text>
  <rect x="872" y="398" width="380" height="46" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="pill" x="1062" y="426" text-anchor="middle">Per-store staff heuristic · floor / quality gates</text>

  <text class="mut" x="660" y="478" text-anchor="middle">Pluggable per-store registry — ST1008 · ST1009  ·  add a store = drop a config module + a clips folder</text>
  <text class="mut" x="660" y="500" text-anchor="middle">Unique visitors counted across all cameras, Re-ID-deduped · the entrance line filters out mall pass-by</text>

  <line x1="660" y1="596" x2="660" y2="624" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- event contract band -->
  <rect x="40" y="626" width="1240" height="58" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text class="ban1" x="660" y="650" text-anchor="middle">Event contract — flat BehaviorEvent  (the single seam between the two tiers)</text>
  <text class="ban2" x="660" y="671" text-anchor="middle">8 types:  ENTRY · EXIT · ZONE_ENTER / EXIT / DWELL · BILLING_QUEUE_JOIN / ABANDON · REENTRY</text>

  <line x1="560" y1="684" x2="400" y2="708" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="760" y1="684" x2="920" y2="708" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- two run modes -->
  <text class="sec" x="40" y="704">TWO RUN MODES → INGEST</text>
  <rect x="150" y="710" width="460" height="80" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="bt" x="172" y="742">Replayer  ·  default  (gate path)</text>
  <text class="bs" x="172" y="766">POSTs committed behavior.jsonl — no YOLO, no keys → seconds</text>
  <rect x="690" y="710" width="460" height="80" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="bt" x="712" y="742">Detector → HttpEventSink  ·  --profile detect</text>
  <text class="bs" x="712" y="766">runs full pipeline, auto-POSTs freshly detected events</text>

  <line x1="380" y1="790" x2="540" y2="812" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="920" y1="790" x2="780" y2="812" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ingest pill -->
  <rect x="350" y="814" width="620" height="50" rx="10" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.8"/>
  <text class="ing" x="660" y="845" text-anchor="middle">POST /events/ingest — idempotent · dedup by event_id · partial success</text>

  <line x1="660" y1="864" x2="660" y2="888" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- intelligence API -->
  <rect x="40" y="890" width="1240" height="206" rx="14" fill="#ecfdf5" stroke="#99f6e4" stroke-width="1.5"/>
  <text class="accT" x="64" y="924">INTELLIGENCE API</text>
  <text class="mut" x="260" y="924">FastAPI · :8000 · validates, persists, computes metrics on read (no pixels)</text>

  <rect x="64" y="940" width="772" height="138" rx="9" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5"/>
  <text class="bt" x="86" y="972">Endpoints  (live, per store)</text>
  <text class="bs" x="86" y="1000">GET /stores · /stores/{id}/metrics · /funnel · /heatmap</text>
  <text class="bs" x="86" y="1024">GET /stores/{id}/anomalies · /health · /metrics (Prometheus)</text>
  <text class="mut" x="86" y="1052">session = the unit · staff excluded · zero-traffic safe · DB-down → 503</text>

  <rect x="856" y="940" width="400" height="138" rx="9" fill="#ffffff" stroke="#99f6e4" stroke-width="1.5"/>
  <text class="bt" x="878" y="972">Business logic  (pure, on read)</text>
  <text class="bs" x="878" y="1000">conversion — 5-min billing window</text>
  <text class="bs" x="878" y="1024">funnel · heatmap · anomalies</text>
  <text class="mut" x="878" y="1052">same fns feed Prometheus gauges</text>

  <!-- API to bottom row -->
  <line x1="198" y1="1096" x2="198" y2="1132" stroke="#94a3b8" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text class="ss" x="214" y="1118">read / write</text>
  <line x1="506" y1="1096" x2="506" y2="1132" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="814" y1="1096" x2="814" y2="1132" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1122" y1="1096" x2="1122" y2="1132" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- storage + serving + observability -->
  <rect x="57" y="1134" width="282" height="84" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="bt" x="198" y="1168" text-anchor="middle">PostgreSQL</text>
  <text class="bs" x="198" y="1191" text-anchor="middle">behavior_events + transactions</text>

  <rect x="365" y="1134" width="282" height="84" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="bt" x="506" y="1168" text-anchor="middle">React Dashboard · :8080</text>
  <text class="bs" x="506" y="1191" text-anchor="middle">store switcher · polls every 4s</text>

  <rect x="673" y="1134" width="282" height="84" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="bt" x="814" y="1166" text-anchor="middle" font-size="14.5">Prometheus :9090</text>
  <text class="bt" x="814" y="1186" text-anchor="middle" font-size="14.5">+ Grafana :3000</text>

  <rect x="981" y="1134" width="282" height="84" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="bt" x="1122" y="1168" text-anchor="middle">Structured JSON logs</text>
  <text class="bs" x="1122" y="1191" text-anchor="middle">trace_id · latency · status</text>

  <!-- footer -->
  <line x1="40" y1="1256" x2="1280" y2="1256" stroke="#e2e8f0" stroke-width="1.5"/>
  <text class="mut" x="660" y="1284" text-anchor="middle">One command, zero manual steps:  docker compose up --build   ·   full detection re-run:  docker compose --profile detect up</text>
</svg>
