server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: any unmatched route falls back to index.html (client-side rendering).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable — cache them hard; never cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
